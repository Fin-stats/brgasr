name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown

      - name: Build site
        run: |
          Rscript -e "pkgdown::build_site()"
